<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="https://lucide.dev/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>MikuLab-Nav</title>
    <script>
      (function () {
        const DEFAULT_SITE_TITLE = 'MikuLab-Nav';
        const DEFAULT_NAV_TITLE = 'MikuLab-Nav';
        const LEGACY_DEFAULT_TITLES = ['CloudNav - 我的导航', 'CloudNav-MikuLab - 我的导航'];

        function hasUsefulTitle(settings) {
          return !!(settings && settings.title && !LEGACY_DEFAULT_TITLES.includes(settings.title));
        }

        function normalizeSettings(settings) {
          if (!settings) {
            return { title: DEFAULT_SITE_TITLE, navTitle: DEFAULT_NAV_TITLE };
          }

          return {
            ...settings,
            title: hasUsefulTitle(settings) ? settings.title : DEFAULT_SITE_TITLE,
            navTitle: settings.navTitle || DEFAULT_NAV_TITLE,
          };
        }

        function fetchWebsiteSettings() {
          const req = new XMLHttpRequest();
          req.open('GET', '/api/storage?getConfig=website', false);
          req.send(null);
          if (req.status >= 200 && req.status < 300 && req.responseText) {
            return JSON.parse(req.responseText);
          }
          return null;
        }

        function applyRoundedFavicon(source) {
          if (!source) return;
          const img = new Image();
          img.crossOrigin = 'anonymous';
          img.onload = function () {
            try {
              var size = 64;
              var radius = 14;
              var canvas = document.createElement('canvas');
              canvas.width = size;
              canvas.height = size;
              var ctx = canvas.getContext('2d');
              if (!ctx) return;

              ctx.beginPath();
              ctx.moveTo(radius, 0);
              ctx.lineTo(size - radius, 0);
              ctx.quadraticCurveTo(size, 0, size, radius);
              ctx.lineTo(size, size - radius);
              ctx.quadraticCurveTo(size, size, size - radius, size);
              ctx.lineTo(radius, size);
              ctx.quadraticCurveTo(0, size, 0, size - radius);
              ctx.lineTo(0, radius);
              ctx.quadraticCurveTo(0, 0, radius, 0);
              ctx.closePath();
              ctx.clip();
              ctx.drawImage(img, 0, 0, size, size);

              var favicon = document.querySelector('link[rel="icon"]');
              if (favicon) {
                favicon.href = canvas.toDataURL('image/png');
              }
            } catch (e) {}
          };
          img.onerror = function () {
            var favicon = document.querySelector('link[rel="icon"]');
            if (favicon) {
              favicon.href = source;
            }
          };
          img.src = source;
        }

        function applyTheme(settings) {
          if (!settings || !settings.theme) return;
          var t = settings.theme;
          var root = document.documentElement;

          var prefersDark = window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: dark)').matches;
          var isDark = t.mode === 'dark' || (t.mode === 'system' && prefersDark);
          if (isDark) root.classList.add('dark');

          if (t.preset && t.preset !== 'default') {
            root.classList.add('theme-' + t.preset);
          }

          var bg = t.background;
          var targetBgUrl = isDark ? (bg && bg.urlDark) || '' : (bg && bg.urlLight) || '';
          if (bg && bg.enabled && targetBgUrl) {
            var safe = String(targetBgUrl).replace(/"/g, '\\"');
            root.style.setProperty('--bg-image', 'url("' + safe + '")');
            var blur = Math.max(0, Math.min(30, Number(bg.blur) || 0));
            root.style.setProperty('--bg-blur', blur + 'px');
            var op = Math.max(0, Math.min(1, Number(bg.opacity)));
            if (Number.isNaN(op)) op = 0.35;
            root.style.setProperty('--bg-overlay-alpha', String(1 - op));
            var size = bg.position === 'contain' ? 'contain'
                    : bg.position === 'tile'    ? '300px' : 'cover';
            var rep  = bg.position === 'tile' ? 'repeat' : 'no-repeat';
            root.style.setProperty('--bg-position-size', size);
            root.style.setProperty('--bg-position-repeat', rep);
            root.classList.add('has-bg-image');
          } else {
            root.style.removeProperty('--bg-image');
            root.classList.remove('has-bg-image');
          }
        }

        try {
          const saved = localStorage.getItem('cloudnav_site_settings');
          let settings = saved ? JSON.parse(saved) : null;

          if (!hasUsefulTitle(settings)) {
            const remoteSettings = fetchWebsiteSettings();
            if (remoteSettings) {
              settings = { ...settings, ...remoteSettings };
              localStorage.setItem('cloudnav_site_settings', JSON.stringify(normalizeSettings(settings)));
            }
          }

          settings = normalizeSettings(settings);
          document.title = settings.title;
          applyTheme(settings);

          if (settings && settings.favicon) {
            applyRoundedFavicon(settings.favicon);
          }
        } catch (e) {}
      })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary:   '#3b82f6',
              secondary: '#64748b',
              dark:      '#0f172a',
              card:      '#1e293b',
              surface:           'rgb(var(--color-surface-rgb) / <alpha-value>)',
              'surface-elevated': 'rgb(var(--color-surface-elevated-rgb) / <alpha-value>)',
              'surface-muted':    'rgb(var(--color-surface-muted-rgb) / <alpha-value>)',
              fg:                 'rgb(var(--color-fg-rgb) / <alpha-value>)',
              'fg-muted':         'rgb(var(--color-fg-muted-rgb) / <alpha-value>)',
              'fg-subtle':        'rgb(var(--color-fg-subtle-rgb) / <alpha-value>)',
              'border-default':   'rgb(var(--color-border-default-rgb) / <alpha-value>)',
              'border-strong':    'rgb(var(--color-border-strong-rgb) / <alpha-value>)',
              accent:             'rgb(var(--color-accent-rgb) / <alpha-value>)',
              'accent-fg':        'rgb(var(--color-accent-fg-rgb) / <alpha-value>)',
              danger:             'rgb(var(--color-danger-rgb) / <alpha-value>)',
              success:            'rgb(var(--color-success-rgb) / <alpha-value>)',
              warning:            'rgb(var(--color-warning-rgb) / <alpha-value>)',
              info:               'rgb(var(--color-info-rgb) / <alpha-value>)',
            }
          }
        }
      }
    </script>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      /* ============================================================
         TWEAK DECK —— 主题调参面板（改这里就够了）
         ============================================================ */
      :root {
        /* ---------- 1. 调色板（RGB 三元组，不要写 # 或 rgb()） ---------- */

        /* Default 预设 */
        --p-default-canvas-light:    248 250 252;
        --p-default-canvas-dark:      15  23  42;
        --p-default-elevated-light:  255 255 255;
        --p-default-elevated-dark:    30  41  59;
        --p-default-accent:           59 130 246;
        --p-default-accent-fg:       255 255 255;

        /* Miku 预设 */
        --p-miku-canvas-light:       244 251 250;
        --p-miku-canvas-dark:         10  14  13;
        --p-miku-elevated-light:     255 255 255;
        --p-miku-elevated-dark:       19  23  21;
        --p-miku-accent:              57 197 187;
        --p-miku-accent-fg-light:    255 255 255;
        --p-miku-accent-fg-dark:      10  14  13;

        /* 文字色（亮 / 暗共用，与画布解耦） */
        --p-text-light:                15  23  42;
        --p-text-light-muted:          71  85 105;
        --p-text-light-subtle:        148 163 184;
        --p-text-dark:                216 228 226;
        --p-text-dark-muted:          148 163 184;
        --p-text-dark-subtle:         100 116 139;

        /* 边框色 */
        --p-border-light:             226 232 240;
        --p-border-dark:               42  50  47;

        /* 状态色（中性，不随主题切换） */
        --p-danger:   239  68  68;
        --p-success:   34 197  94;
        --p-warning:  245 158  11;
        --p-info:      14 165 233;

        /* ---------- 2. 状态强度（激活 / hover） ---------- */
        --tune-active-bg-alpha:       0.10;
        --tune-active-bar-width:      2px;
        --tune-hover-bg-alpha:        0.06;

        /* ---------- 3. 毛玻璃（仅 has-bg-image 时生效） ---------- */
        --tune-glass-bg-alpha-light:        0.65;
        --tune-glass-bg-alpha-dark:         0.55;
        --tune-glass-card-alpha-light:      0.55;
        --tune-glass-card-alpha-dark:       0.50;
        --tune-glass-card-hover-light:      0.15;
        --tune-glass-card-hover-dark:       0.40;
        --tune-glass-blur:                 16px;
        --tune-glass-saturate:             140%;
        --tune-glass-border-alpha:        0.18;

        /* ---------- 4. 背景图层（运行时由 JS 注入图片） ---------- */
        --bg-image:           none;
        --bg-blur:            8px;
        --bg-overlay-alpha:   0.30;
        --bg-position-size:   cover;
        --bg-position-repeat: no-repeat;

        /* default + light */
        --color-surface-rgb:           var(--p-default-canvas-light);
        --color-surface-elevated-rgb:  var(--p-default-elevated-light);
        --color-surface-muted-rgb:     241 245 249;
        --color-fg-rgb:                var(--p-text-light);
        --color-fg-muted-rgb:          var(--p-text-light-muted);
        --color-fg-subtle-rgb:         var(--p-text-light-subtle);
        --color-border-default-rgb:    var(--p-border-light);
        --color-border-strong-rgb:     203 213 225;
        --color-accent-rgb:            var(--p-default-accent);
        --color-accent-fg-rgb:         var(--p-default-accent-fg);
        --color-danger-rgb:            var(--p-danger);
        --color-success-rgb:           var(--p-success);
        --color-warning-rgb:           var(--p-warning);
        --color-info-rgb:              var(--p-info);
      }

      html.dark {
        --color-surface-rgb:           var(--p-default-canvas-dark);
        --color-surface-elevated-rgb:  var(--p-default-elevated-dark);
        --color-surface-muted-rgb:     30 41 59;
        --color-fg-rgb:                var(--p-text-dark);
        --color-fg-muted-rgb:          var(--p-text-dark-muted);
        --color-fg-subtle-rgb:         var(--p-text-dark-subtle);
        --color-border-default-rgb:    var(--p-border-dark);
        --color-border-strong-rgb:     71 85 105;
        --color-accent-rgb:            96 165 250;
        --color-accent-fg-rgb:         var(--p-default-canvas-dark);
      }

      html.theme-miku {
        --color-surface-rgb:           var(--p-miku-canvas-light);
        --color-surface-elevated-rgb:  var(--p-miku-elevated-light);
        --color-surface-muted-rgb:     232 245 243;
        --color-fg-rgb:                13  42  40;
        --color-fg-muted-rgb:          61  94  91;
        --color-fg-subtle-rgb:        138 168 165;
        --color-border-default-rgb:   207 231 227;
        --color-border-strong-rgb:    163 210 204;
        --color-accent-rgb:            var(--p-miku-accent);
        --color-accent-fg-rgb:         var(--p-miku-accent-fg-light);
      }

      html.theme-miku.dark {
        --color-surface-rgb:           var(--p-miku-canvas-dark);
        --color-surface-elevated-rgb:  var(--p-miku-elevated-dark);
        --color-surface-muted-rgb:     26  58  55;
        --color-fg-rgb:                var(--p-text-dark);
        --color-fg-muted-rgb:          168 208 204;
        --color-fg-subtle-rgb:          90 121 118;
        --color-border-default-rgb:    34  74  69;
        --color-border-strong-rgb:     51 107 101;
        --color-accent-rgb:            var(--p-miku-accent);
        --color-accent-fg-rgb:         var(--p-miku-accent-fg-dark);
      }

      /* ============================================================
         背景图层 —— 通过 body 伪元素渲染，避免污染组件
         ============================================================ */
      html.has-bg-image body { position: relative; }
      html.has-bg-image body::before {
        content: '';
        position: fixed; inset: 0;
        background-image: var(--bg-image);
        background-size: var(--bg-position-size, cover);
        background-position: center;
        background-repeat: var(--bg-position-repeat, no-repeat);
        filter: blur(var(--bg-blur, 0));
        transform: scale(1.05);   /* 防止 blur 时边缘出现透明缝 */
        z-index: -2;
        pointer-events: none;
      }
      html.has-bg-image body::after {
        content: '';
        position: fixed; inset: 0;
        background-color: rgb(var(--color-surface-rgb));
        opacity: var(--bg-overlay-alpha, 1);
        z-index: -1;
        pointer-events: none;
        transition: opacity 0.2s;
      }
      /* ============================================================
         背景图穿透 —— 启用背景图时，让画布层透明，让伪元素层显形
         ============================================================ */
      html.has-bg-image body {
        background-color: transparent !important;
      }
      html.has-bg-image main {
        background-color: transparent !important;
      }

      /* ============================================================
         毛玻璃 —— 仅 has-bg-image 时生效
         ============================================================ */

      /* 静态玻璃：侧栏 / Header / Modal */
      html.has-bg-image .frost {
        background-color: rgb(var(--color-surface-elevated-rgb) / var(--tune-glass-bg-alpha-light)) !important;
        backdrop-filter: blur(var(--tune-glass-blur)) saturate(var(--tune-glass-saturate));
        -webkit-backdrop-filter: blur(var(--tune-glass-blur)) saturate(var(--tune-glass-saturate));
        border-color: rgb(var(--color-fg-rgb) / var(--tune-glass-border-alpha)) !important;
      }
      html.has-bg-image.dark .frost {
        background-color: rgb(var(--color-surface-elevated-rgb) / var(--tune-glass-bg-alpha-dark)) !important;
      }

      /* 卡片玻璃：默认半透明叠层；启用背景图时 hover 近乎透出背景 */
      html.has-bg-image .frost-card {
        background-color: rgb(255 255 255 / 0.12) !important;
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
        border-color: rgb(var(--color-fg-rgb) / 0.08) !important;
        transition: background-color 0.2s ease;
      }
      html.has-bg-image.dark .frost-card {
        background-color: rgb(0 0 0 / 0.16) !important;
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
        border-color: rgb(255 255 255 / 0.08) !important;
      }
      html.has-bg-image .frost-card:hover {
        background-color: rgb(var(--color-surface-elevated-rgb) / 0.04) !important;
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
      }
      html.has-bg-image.dark .frost-card:hover {
        background-color: rgb(var(--color-surface-elevated-rgb) / 0.02) !important;
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
      }

      /* Custom scrollbar for sidebar */
      .scrollbar-hide::-webkit-scrollbar {
          display: none;
      }
      .scrollbar-hide {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }
      /* Simple CSS-only tooltip transition */
      .tooltip-custom {
          transition: opacity 0.2s, visibility 0.2s;
          pointer-events: none;
      }
    </style>
