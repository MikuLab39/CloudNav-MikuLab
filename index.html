<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="https://lucide.dev/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>MikuLab-Nav</title>
    <script>
      (function () {
        const DEFAULT_SITE_TITLE = 'MikuLab-Nav';
        const DEFAULT_NAV_TITLE = 'MikuLab-Nav';
        const LEGACY_DEFAULT_TITLES = ['CloudNav - 我的导航', 'CloudNav-MikuLab - 我的导航'];

        function hasUsefulTitle(settings) {
          return !!(settings && settings.title && !LEGACY_DEFAULT_TITLES.includes(settings.title));
        }

        function normalizeSettings(settings) {
          if (!settings) {
            return { title: DEFAULT_SITE_TITLE, navTitle: DEFAULT_NAV_TITLE };
          }

          return {
            ...settings,
            title: hasUsefulTitle(settings) ? settings.title : DEFAULT_SITE_TITLE,
            navTitle: settings.navTitle || DEFAULT_NAV_TITLE,
          };
        }

        function fetchWebsiteSettings() {
          const req = new XMLHttpRequest();
          req.open('GET', '/api/storage?getConfig=website', false);
          req.send(null);
          if (req.status >= 200 && req.status < 300 && req.responseText) {
            return JSON.parse(req.responseText);
          }
          return null;
        }

        function applyRoundedFavicon(source) {
          if (!source) return;
          const img = new Image();
          img.crossOrigin = 'anonymous';
          img.onload = function () {
            try {
              var size = 64;
              var radius = 14;
              var canvas = document.createElement('canvas');
              canvas.width = size;
              canvas.height = size;
              var ctx = canvas.getContext('2d');
              if (!ctx) return;

              ctx.beginPath();
              ctx.moveTo(radius, 0);
              ctx.lineTo(size - radius, 0);
              ctx.quadraticCurveTo(size, 0, size, radius);
              ctx.lineTo(size, size - radius);
              ctx.quadraticCurveTo(size, size, size - radius, size);
              ctx.lineTo(radius, size);
              ctx.quadraticCurveTo(0, size, 0, size - radius);
              ctx.lineTo(0, radius);
              ctx.quadraticCurveTo(0, 0, radius, 0);
              ctx.closePath();
              ctx.clip();
              ctx.drawImage(img, 0, 0, size, size);

              var favicon = document.querySelector('link[rel="icon"]');
              if (favicon) {
                favicon.href = canvas.toDataURL('image/png');
              }
            } catch (e) {}
          };
          img.onerror = function () {
            var favicon = document.querySelector('link[rel="icon"]');
            if (favicon) {
              favicon.href = source;
            }
          };
          img.src = source;
        }

        function applyTheme(settings) {
          if (!settings || !settings.theme) return;
          var t = settings.theme;
          var root = document.documentElement;

          var prefersDark = window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: dark)').matches;
          var isDark = t.mode === 'dark' || (t.mode === 'system' && prefersDark);
          if (isDark) root.classList.add('dark');

          if (t.preset && t.preset !== 'default') {
            root.classList.add('theme-' + t.preset);
          }

          var bg = t.background;
          if (bg && bg.enabled && bg.url) {
            var safe = String(bg.url).replace(/"/g, '\\"');
            root.style.setProperty('--bg-image', 'url("' + safe + '")');
            var blur = Math.max(0, Math.min(30, Number(bg.blur) || 0));
            root.style.setProperty('--bg-blur', blur + 'px');
            var op = Math.max(0, Math.min(1, Number(bg.opacity)));
            if (Number.isNaN(op)) op = 0.35;
            root.style.setProperty('--bg-overlay-alpha', String(1 - op));
            var size = bg.position === 'contain' ? 'contain'
                    : bg.position === 'tile'    ? '300px' : 'cover';
            var rep  = bg.position === 'tile' ? 'repeat' : 'no-repeat';
            root.style.setProperty('--bg-position-size', size);
            root.style.setProperty('--bg-position-repeat', rep);
            root.classList.add('has-bg-image');
          }
        }

        try {
          const saved = localStorage.getItem('cloudnav_site_settings');
          let settings = saved ? JSON.parse(saved) : null;

          if (!hasUsefulTitle(settings)) {
            const remoteSettings = fetchWebsiteSettings();
            if (remoteSettings) {
              settings = { ...settings, ...remoteSettings };
              localStorage.setItem('cloudnav_site_settings', JSON.stringify(normalizeSettings(settings)));
            }
          }

          settings = normalizeSettings(settings);
          document.title = settings.title;
          applyTheme(settings);

          if (settings && settings.favicon) {
            applyRoundedFavicon(settings.favicon);
          }
        } catch (e) {}
      })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              // 旧 token 保留作 alias
              primary:   '#3b82f6',
              secondary: '#64748b',
              dark:      '#0f172a',
              card:      '#1e293b',

              // 新语义 token —— 由 CSS 变量驱动
              surface:            'var(--color-surface)',
              'surface-elevated': 'var(--color-surface-elevated)',
              'surface-muted':    'var(--color-surface-muted)',
              fg:                 'var(--color-fg)',
              'fg-muted':         'var(--color-fg-muted)',
              'fg-subtle':        'var(--color-fg-subtle)',
              'border-default':   'var(--color-border-default)',
              'border-strong':    'var(--color-border-strong)',
              accent:             'var(--color-accent)',
              'accent-fg':        'var(--color-accent-fg)',
              'accent-soft':      'var(--color-accent-soft)',
              danger:             'var(--color-danger)',
              success:            'var(--color-success)',
              warning:            'var(--color-warning)',
              info:               'var(--color-info)',
            }
          }
        }
      }
    </script>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      /* ============================================================
         Theme tokens —— 语义 token 由 CSS 变量驱动
         ============================================================ */
      :root {
        --color-surface:           #f8fafc;
        --color-surface-elevated:  #ffffff;
        --color-surface-muted:     #f1f5f9;
        --color-fg:                #0f172a;
        --color-fg-muted:          #475569;
        --color-fg-subtle:         #94a3b8;
        --color-border-default:    #e2e8f0;
        --color-border-strong:     #cbd5e1;
        --color-accent:            #3b82f6;
        --color-accent-fg:         #ffffff;
        --color-accent-soft:       #dbeafe;
        --color-danger:            #ef4444;
        --color-success:           #22c55e;
        --color-warning:           #f59e0b;
        --color-info:              #0ea5e9;

        --bg-image:           none;
        --bg-blur:            0px;
        --bg-overlay-alpha:   1;        /* 1 = 完全遮挡（看不到图）；0 = 完全透出图 */
        --bg-position-size:   cover;
        --bg-position-repeat: no-repeat;
      }

      /* default 主题暗色 */
      html.dark {
        --color-surface:           #0f172a;
        --color-surface-elevated:  #1e293b;
        --color-surface-muted:     #1e293b;
        --color-fg:                #f8fafc;
        --color-fg-muted:          #cbd5e1;
        --color-fg-subtle:         #64748b;
        --color-border-default:    #334155;
        --color-border-strong:     #475569;
        --color-accent:            #60a5fa;
        --color-accent-fg:         #0f172a;
        --color-accent-soft:       rgba(96, 165, 250, 0.15);
      }

      /* Miku 主题（亮） */
      html.theme-miku {
        --color-surface:           #f4fbfa;
        --color-surface-elevated:  #ffffff;
        --color-surface-muted:     #e8f5f3;
        --color-fg:                #0d2a28;
        --color-fg-muted:          #3d5e5b;
        --color-fg-subtle:         #8aa8a5;
        --color-border-default:    #cfe7e3;
        --color-border-strong:     #a3d2cc;
        --color-accent:            #39C5BB;
        --color-accent-fg:         #ffffff;
        --color-accent-soft:       #d4f0ed;
      }

      /* Miku 主题（暗）—— 与 .dark 类叠加 */
      html.theme-miku.dark {
        --color-surface:           #0d1f1e;
        --color-surface-elevated:  #163331;
        --color-surface-muted:     #1a3a37;
        --color-fg:                #ecfffd;
        --color-fg-muted:          #a8d0cc;
        --color-fg-subtle:         #5a7976;
        --color-border-default:    #224a45;
        --color-border-strong:     #336b65;
        --color-accent:            #39C5BB;
        --color-accent-fg:         #0d1f1e;
        --color-accent-soft:       rgba(57, 197, 187, 0.18);
      }

      /* ============================================================
         背景图层 —— 通过 body 伪元素渲染，避免污染组件
         ============================================================ */
      html.has-bg-image body { position: relative; }
      html.has-bg-image body::before {
        content: '';
        position: fixed; inset: 0;
        background-image: var(--bg-image);
        background-size: var(--bg-position-size, cover);
        background-position: center;
        background-repeat: var(--bg-position-repeat, no-repeat);
        filter: blur(var(--bg-blur, 0));
        transform: scale(1.05);   /* 防止 blur 时边缘出现透明缝 */
        z-index: -2;
        pointer-events: none;
      }
      html.has-bg-image body::after {
        content: '';
        position: fixed; inset: 0;
        background-color: var(--color-surface);
        opacity: var(--bg-overlay-alpha, 1);
        z-index: -1;
        pointer-events: none;
        transition: opacity 0.2s;
      }
      /* ============================================================
         背景图穿透 —— 启用背景图时，让画布层透明，让伪元素层显形
         ============================================================ */
      html.has-bg-image body {
        background-color: transparent !important;
      }
      html.has-bg-image main {
        background-color: transparent !important;
      }

      /* Custom scrollbar for sidebar */
      .scrollbar-hide::-webkit-scrollbar {
          display: none;
      }
      .scrollbar-hide {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }
      /* Simple CSS-only tooltip transition */
      .tooltip-custom {
          transition: opacity 0.2s, visibility 0.2s;
          pointer-events: none;
      }
    </style>

</script>
</head>
